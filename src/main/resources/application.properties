spring.application.name=cyctest

# -------- LLM Provider \u5207\u6362 --------
# siliconflow (\u76F4\u8C03 RestClient)  |  spring-ai (Spring AI ChatModel\uFF0C\u751F\u4EA7\u63A8\u8350)
agent.llm.provider=spring-ai

# -------- SiliconFlow \u76F4\u8C03\u914D\u7F6E\uFF08agent.llm.provider=siliconflow \u65F6\u751F\u6548\uFF09--------
agent.siliconflow.enabled=true
agent.siliconflow.api-key=${SILICONFLOW_API_KEY:}
agent.siliconflow.base-url=https://api.siliconflow.cn/v1/chat/completions
agent.siliconflow.model=Qwen/Qwen2.5-7B-Instruct
agent.siliconflow.temperature=0.2
agent.siliconflow.timeout-millis=4000

# -------- Spring AI \u914D\u7F6E\uFF08\u751F\u4EA7\u6A21\u5F0F\uFF09--------
spring.ai.openai.base-url=https://api.siliconflow.cn
spring.ai.openai.api-key=${SILICONFLOW_API_KEY:sk-klevkrdkbgattcxaoidmipmphcwlkxnlpckpbwihfdwmzgvu}
spring.ai.openai.chat.options.model=Qwen/Qwen2.5-7B-Instruct
spring.ai.openai.chat.options.temperature=0.2

# -------- Embedding \u6A21\u578B\uFF08RAG \u5411\u91CF\u5316 + Episodic Memory\uFF09--------
spring.ai.openai.embedding.base-url=https://api.siliconflow.cn
spring.ai.openai.embedding.api-key=${SILICONFLOW_API_KEY:sk-klevkrdkbgattcxaoidmipmphcwlkxnlpckpbwihfdwmzgvu}
spring.ai.openai.embedding.options.model=BAAI/bge-m3

# -------- RAG \u68C0\u7D22\u6A21\u5F0F\uFF08\u751F\u4EA7\u4F7F\u7528 spring-ai\uFF1A\u771F\u5B9E Embedding + VectorStore\uFF09--------
# legacy: Jaccard \u5047\u5411\u91CF | spring-ai: BAAI/bge-m3 + Redis Vector
agent.rag.retriever=spring-ai

# -------- \u4F1A\u8BDD\u5B58\u50A8\uFF08Session Memory\uFF09--------
# in-memory: \u5F00\u53D1\u6A21\u5F0F\uFF0C\u91CD\u542F\u4E22\u5931 | redis: \u751F\u4EA7\u6A21\u5F0F\uFF0C\u6301\u4E45\u5316
agent.memory.store=redis
agent.memory.ttl-days=7

# -------- Episodic Memory\uFF08\u5173\u952E\u5BF9\u8BDD\u7247\u6BB5\u5411\u91CF\u5316\u5B58\u50A8\uFF09--------
agent.episodic.enabled=true

# -------- Redis VectorStore\uFF08RAG + Episodic Memory \u5171\u7528\uFF09--------
spring.ai.vectorstore.redis.initialize-schema=true
spring.ai.vectorstore.redis.index-name=agent-knowledge-idx
spring.ai.vectorstore.redis.prefix=embedding:

# -------- Redis \u8FDE\u63A5\uFF08VectorStore + Session + Episodic \u5171\u7528\uFF09--------
spring.data.redis.host=localhost
spring.data.redis.port=6379

# -------- Agent Runtime --------
agent.runtime.max-clarify-rounds=2
agent.runtime.min-evidence-score=0.45
agent.runtime.rrf-rank-constant=60
agent.runtime.bm25-top-k=50
agent.runtime.fused-top-k=30
agent.runtime.final-top-k=8

# -------- MCP Server\uFF08\u5C06 Agent \u5DE5\u5177\u4EE5 MCP \u534F\u8BAE\u5BF9\u5916\u66B4\u9732\uFF09--------
spring.ai.mcp.server.enabled=true
spring.ai.mcp.server.name=agent-mcp-server
spring.ai.mcp.server.version=1.0.0

# -------- Actuator\uFF08\u751F\u4EA7\u76D1\u63A7\uFF09--------
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=when-authorized
management.info.env.enabled=true
info.app.name=${spring.application.name}
info.app.version=1.0.0

# -------- \u6587\u4EF6\u4E0A\u4F20\u9650\u5236 --------
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=55MB

# -------- Circuit Breaker\uFF08LLM \u7194\u65AD\u4FDD\u62A4\uFF09--------
# \u5931\u8D25\u7387 > 50% \u65F6\u8FDB\u5165 OPEN \u72B6\u6001\uFF0C10 \u79D2\u540E\u8FDB\u5165 HALF_OPEN \u63A2\u6D4B\u6062\u590D
resilience4j.circuitbreaker.instances.llm-client.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.llm-client.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.llm-client.sliding-window-size=10
resilience4j.circuitbreaker.instances.llm-client.sliding-window-type=COUNT_BASED
resilience4j.circuitbreaker.instances.llm-client.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.llm-client.minimum-number-of-calls=5

# -------- Semantic Cache\uFF08\u8BED\u4E49\u7F13\u5B58\uFF09--------
agent.semantic-cache.enabled=true
agent.semantic-cache.similarity-threshold=0.92
agent.semantic-cache.ttl-hours=2

# -------- Advanced RAG\uFF08\u67E5\u8BE2\u6539\u5199\uFF09--------
# Query Rewriting\uFF1ALLM \u6539\u5199\u7528\u6237\u67E5\u8BE2\u4E3A\u591A\u89D2\u5EA6\u5B50\u67E5\u8BE2\uFF0C\u63D0\u5347\u53EC\u56DE\u7387
agent.rag.query-rewriting.enabled=true
# HyDE\uFF1A\u751F\u6210\u5047\u8BBE\u6587\u6863 Embedding \u68C0\u7D22\uFF08\u6210\u672C\u9AD8\uFF0C\u9ED8\u8BA4\u5173\u95ED\uFF09
agent.rag.hyde.enabled=false

# -------- Spring AI Observation\uFF08LLM \u53EF\u89C2\u6D4B\u6027\uFF09--------
# \u6BCF\u6B21 LLM/Embedding/VectorStore \u8C03\u7528\u81EA\u52A8\u751F\u6210 Micrometer Span
spring.ai.chat.observations.include-prompt=false
spring.ai.chat.observations.include-completion=false
management.tracing.sampling.probability=1.0
